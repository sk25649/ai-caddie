const BACK = HOLES.slice(9, 18);

function CaddieGuide() {
  const [selectedHole, setSelectedHole] = useState(0);
  const [showMissPanel, setShowMissPanel] = useState(null);
  const [scores, setScores] = useState(Array(18).fill(null));
  const hole = HOLES[selectedHole];

  const frontPar = FRONT.reduce((s, h) => s + h.par, 0);
  const backPar = BACK.reduce((s, h) => s + h.par, 0);
  const totalPar = frontPar + backPar;
  const frontYds = FRONT.reduce((s, h) => s + h.white, 0);
  const backYds = BACK.reduce((s, h) => s + h.white, 0);
  const parChances = HOLES.filter(h => h.parChance).length;
  const bogeyHoles = HOLES.filter(h => !h.parChance).length;

  const holesPlayed = scores.filter(s => s !== null).length;
  const currentTotal = scores.reduce((s, v) => s + (v || 0), 0);
  const currentOverPar = scores.reduce((s, v, i) => {
    if (v === null) return s;
    return s + (v - HOLES[i].par);
  }, 0);
  const projectedFinal = currentTotal + HOLES.filter((_, i) => scores[i] === null).reduce((s, h) => s + h.par + 1, 0);

    const newScores = [...scores];
    const val = hole.par + delta;
    newScores[selectedHole] = newScores[selectedHole] === val ? null : val;
    setScores(newScores);
  };

        React.createElement('span', null, "Thu Mar 19 · 12:30 PM"),

      )

    // Scoring Targets
    React.createElement('div', {style: s({display: "flex", justifyContent: "center", gap: 12, padding: "12px 16px", background: "rgba(0,0,0,0.3)", borderBottom: "1px solid rgba(196,164,78,0.2)", flexWrap: "wrap"})},

        React.createElement('div', {style:{width:"100%",textAlign:"center",fontSize:11,color:"#a09880",marginBottom:4,letterSpacing:2}}, "FRONT 9"),
