<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1a0a">
<title>Caddie Playbook — Trump National LA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a843;
    --gold-dim: #a08030;
    --green-deep: #0a1a0a;
    --green-mid: #142814;
    --green-card: #0f200f;
    --cream: #f0e8d8;
    --cream-dim: #b8a888;
    --red: #e05545;
    --red-bg: rgba(224,85,69,0.12);
    --par-green: #3dbd6e;
    --par-bg: rgba(61,189,110,0.1);
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body { background: var(--green-deep); font-family: var(--font-body); color: var(--cream); -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; max-width: 600px; margin: 0 auto; }

  /* Hole selector buttons */
  .hole-btn {
    width: 42px; height: 42px; border-radius: 10px; font-family: var(--font-body);
    font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    border: 2px solid rgba(212,168,67,0.15); background: rgba(0,0,0,0.3); color: var(--cream-dim);
  }
  .hole-btn.active {
    border-color: var(--gold); background: rgba(212,168,67,0.2); color: var(--gold); font-weight: 700;
  }
  .hole-btn.scored { font-size: 15px; }

  /* Miss buttons */
  .miss-btn {
    flex: 1; min-width: 100px; padding: 14px 10px; border-radius: 12px;
    font-family: var(--font-body); font-size: 15px; font-weight: 600;
    cursor: pointer; text-align: center; transition: all 0.15s;
    border: 2px solid rgba(212,168,67,0.15); background: rgba(0,0,0,0.3); color: var(--cream-dim);
  }
  .miss-btn.active { color: #fff; }

  /* Score buttons */
  .score-btn {
    padding: 10px 14px; border-radius: 10px; min-width: 52px; text-align: center;
    font-family: var(--font-body); cursor: pointer; transition: all 0.15s;
    border: 2px solid rgba(212,168,67,0.15); background: rgba(0,0,0,0.3); color: var(--cream-dim);
  }
  .score-btn.active { color: #fff; font-weight: 700; }

  /* Card */
  .card {
    background: var(--green-card); border: 1.5px solid rgba(212,168,67,0.2);
    border-radius: 16px; overflow: hidden; margin: 0 16px;
  }

  /* Section label */
  .section-label {
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); font-weight: 700; margin-bottom: 12px;
  }

  /* Smooth expand */
  .miss-detail {
    margin-top: 14px; padding: 18px; background: rgba(0,0,0,0.35);
    border-radius: 12px; border: 1.5px solid rgba(212,168,67,0.12);
    font-size: 17px; line-height: 1.75; color: var(--cream);
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const HOLES = [
  { num:1,par:4,white:309,hdcp:11,name:"The Welcome",teeClub:"3-Hybrid",parChance:true,
    strategy:"Perfect warm-up. 3H to 215 leaves ~95 in — smooth PW. Fairway is massive. Aim right-center, let the draw bring it back. Green is only 26 yards deep, water front AND back. Land it center-green. Don't pin-hunt.",

    missRight:"Slice puts you right side. Still wedge distance. Easy.",
    flop:"Chunk leaves 150ish out. 7-iron to front-center. Water fronts the green — carry it.",
    scoring:"Par hole for you. 3H + PW + two-putt. Banking one toward 85.",
    danger:"Water BEHIND the green too. Do NOT go long. Front-center always. Deep breath on the first tee.", target:"Par chance" },

  { num:2,par:5,white:450,hdcp:15,name:"Downwind Birdie",teeClub:"3-Hybrid",parChance:true,
    strategy:"Easiest birdie/par chance all day. Downwind par 5. 3H, 3H or layup to 125, PW on. Fairway slopes L→R, your draw fights it perfectly. Pot bunker at ~100 yds — lay up to 125 or 80, never 100.",
    missLeft:"Hook into left rough. Clear layup line. Fairway tilts right so you got extra roll.",

    scoring:"Three-shot par 5. 3H + 3H + PW. Should NEVER be worse than bogey.",
    danger:"Pot bunker at ~100 yds. Pick layup carefully: 125 or 80, never 100.", target:"Par chance" },

  { num:3,par:4,white:336,hdcp:13,name:"Precision Test",teeClub:"3-Hybrid",parChance:true,
    strategy:"Short par 4. Two bunkers right, fairway slopes right into them. Your draw fights the slope. 3H to 215 leaves ~120 in = PW. Aim right-center, let draw work.",
    missLeft:"Hook goes left — safe side. Slightly longer approach, clean lie.",
    missRight:"Slice rides the slope into fairway bunkers. Get out sideways, wedge on. Bogey.",
    flop:"At 336, even a top is in range. Play to your number.",
    scoring:"Bogey baseline, par very gettable. 3H + PW is simple. Below the hole matters.",
    danger:"Don't go long — collection areas behind green are tough.", target:"Par chance" },

  { num:4,par:3,white:137,hdcp:17,name:"Downhill Beauty",teeClub:"PW",parChance:true,
    strategy:"Easiest hole on the course. 137 yds downhill, wind behind = plays 120–125. PW is your club. Green is 43 YARDS DEEP. Just find the surface. Aim right-center. Free par.",
    missLeft:"Hook left. Chip back. Bogey at worst.",
    missRight:"Sand right. Bunker shot to center. Bogey.",
    flop:"Chunk = uphill chip to a deep green. Up-and-down is doable.",
    scoring:"PW to a 43-yard-deep green. This IS your par. Take it.",
    danger:"Back-right pin is a sucker. Center-green, two-putt, done.", target:"Par chance" },

  { num:5,par:4,white:397,hdcp:3,name:"Trump's Corner Begins",teeClub:"3-Hybrid",parChance:false,
    strategy:"Welcome to Trump's Corner. #3 handicap, 397 yds. 3H to 215 leaves ~182 = another 3H toward green. If it comes up short, chip on for bogey. Bogey is a GREAT score here. 70-yard bunker down the left where your hook lives.",
    missLeft:"HIGH HOOK ALERT. 70-yard left bunker. Play out sideways. Don't compound it.",
    missRight:"Right rough, line to green. Lay up to 125 if bad lie.",
    flop:"Chunk = 200+ in. Advance down fairway. Bogey or double.",

  { num:6,par:4,white:397,hdcp:5,name:"The Squeeze",teeClub:"3-Hybrid",parChance:false,
    strategy:"Dogleg left, bunkers both sides. 3H to 215, then 7-iron toward green (~20 yds short), chip on. High-percentage bogey, possible par if chip is close. Draw works with the dogleg — don't overdo it.",

    missRight:"Sand right, more forgiving. Advance toward green.",
    flop:"Long hole now. Get to wedge range in two more. Limit to double.",
    scoring:"Bogey is the plan. 3H + 7I + chip + two-putt = 5.",

  { num:7,par:5,white:512,hdcp:9,name:"The Long One",teeClub:"3-Hybrid",parChance:false,

    missRight:"100-yard bunker right. If near it, lay up to 140 instead.",

  { num:8,par:3,white:183,hdcp:7,name:"Lakeside Beast",teeClub:"3-Hybrid",parChance:false,
    strategy:"⚠️ MOST DANGEROUS HOLE FOR YOUR GAME. Lake runs the ENTIRE left side. Your draw goes straight at it. AIM AT THE RIGHT BUNKER. Choke down on 3H. Green is 50 yards deep. Right bunker = WIN compared to the lake.",

  { num:9,par:4,white:422,hdcp:1,name:"The Monster",teeClub:"Driver ⚡",parChance:false,
    strategy:"Hardest hole. DRIVER HOLE #1 of 2. 422 yds, 120-yard bunker down entire left. Hole shape suits your draw — but DON'T overcook it. Aim right-center. Driver to 250 leaves 172 for 3H approach.",

    flop:"Bad drive = 200+ in. Advance twice, try for bogey.",
    scoring:"Bogey is great. Double is acceptable. Trump's Corner is OVER after this. Survive.",
    danger:"120-yard left bunker catches draws. Lake left of green. Start RIGHT.", target:"Bogey" },

  { num:10,par:4,white:280,hdcp:10,name:"The Quirky One",teeClub:"7-Iron",parChance:true,
    strategy:"🎉 FREEDOM. Trump's Corner is done. Short dogleg left, 280 yds. Ocean cliffs left. 7-iron to 160 leaves ~120 for PW. Deep breath. 7-iron, wedge, putt. The back nine is friendlier.",

    missRight:"Safe. Slightly longer approach, still PW.",
    flop:"Chunk stays short of barranca. No drama.",
    scoring:"PAR HOLE. 7I + PW = bread and butter. Claw back here.",
    danger:"Do NOT try to drive this green. 7-iron = par. Hero play = lost ball.", target:"Par chance" },

  { num:11,par:3,white:187,hdcp:8,name:"Shallow Shelf",teeClub:"3-Hybrid",parChance:false,
    strategy:"187 yds, green only 20 PACES DEEP. Super shallow. 3H, aim center-right. Ball must LAND on the green, not bounce through. If between clubs, take the SHORTER one.",
    missLeft:"Hook left. Chip from fringe. Manageable bogey.",
    missRight:"Chip from right. Also manageable.",
    flop:"Short = front bunkers. Sand shot to middle. Bogey.",
    scoring:"Bogey is fine. Shallow green makes par hard. Find the surface, two-putt, move on.",

  { num:12,par:5,white:475,hdcp:12,name:"Roller Coaster",teeClub:"3-Hybrid",parChance:true,
    strategy:"Shortest par 5, downwind. Same formula as #2: three good shots = par. 3H, iron/3H to set up 125, PW on. Fairway bunker LEFT where hook goes. Aim right-center. Green is multi-tiered and wild.",
    missLeft:"Fairway bunker left catches hook. Lay up from sand.",
    missRight:"Right rough is fine. Advance or lay up.",
    flop:"Three-shot hole. Get to 125, PW.",
    scoring:"Par is very real. Three solid shots + PW. One of your par chances — take it.",
    danger:"Multi-tiered green = three-putts. Read the tiers. Right level > close to pin.", target:"Par chance" },

  { num:13,par:4,white:385,hdcp:4,name:"Blind Bully",teeClub:"3-Hybrid",parChance:false,
    strategy:"Blind tee shot, narrowest fairway on the course. 3H to 215, then 7-iron toward green (~10 yds short), chip on for bogey. Fairway is non-negotiable — rugged terrain both sides.",
    missLeft:"Scrub. Pitch to fairway. Bogey or double.",
    missRight:"Also scrub. Get back to fairway.",
    flop:"Long hole now. Limit damage to double.",
    scoring:"Bogey target. Two safe irons + chip + two-putt = 5. Fine.",
    danger:"Narrowest fairway. Trust 3H, aim dead center, smooth swing.", target:"Bogey" },

  { num:14,par:5,white:459,hdcp:6,name:"The S-Curve",teeClub:"3-Hybrid",parChance:false,
    strategy:"S-shaped, barrancas BOTH sides. 3H to 215, layup to 125–130 (barranca sliver at ~115 — avoid it). PW on. Three smart shots.",
    missLeft:"Barranca left. Ball could be lost. Hook is dangerous — aim right-center.",
    missRight:"Barranca right too, but further. Right rough survivable.",
    flop:"Three-shot hole. Advance to PW distance.",
    scoring:"Bogey target, par possible. Three controlled shots + PW + two-putt.",
    danger:"Barrancas BOTH sides. 115-yard sliver is the trap. Don't go long — wrap-around bunker behind.", target:"Bogey" },

  { num:15,par:3,white:131,hdcp:16,name:"The Short One",teeClub:"PW",parChance:true,
    strategy:"131 yards. FREE PAR. PW with a little extra. C-shaped bunker around green, pot bunker right. Aim right-center, draw works to middle. 131 yards. You hit this every day.",
    missLeft:"C-shaped bunker. Sand to center. Bogey.",
    missRight:"Pot bunker right. Steep face. Blast out. Draw should keep you away.",
    flop:"Short = front bunker. Get on green, two-putt.",
    scoring:"PAR. PERIOD. 131 with a wedge. Go get it.",
    danger:"Pot bunker right. Don't chase a right pin. Center-green.", target:"Par chance" },

  { num:16,par:4,white:278,hdcp:18,name:"Risk-Reward Dogleg",teeClub:"7-Iron",parChance:true,
    strategy:"Easiest handicap hole. Dogleg left, 278 yds. Lake left from 100 in. Hit 7-iron to 160, leaves ~118 for PW. Same as #10. Driver and 3H are NOT in your hand.",
    missLeft:"LAKE. Draw + dogleg + water = danger. 7-iron keeps you short of trouble.",
    missRight:"Safe. Right rough, clear approach. Slice is fine.",
    flop:"Any shot leaves a straightforward approach.",
    scoring:"PAR HOLE. 7I + PW. Easiest par on the back nine. Bank it.",
    danger:"Lake left. Do NOT hit more than 7-iron. Draw + longer club + dogleg = water.", target:"Par chance" },

  { num:17,par:3,white:181,hdcp:14,name:"Waterfall Signature",teeClub:"3-Hybrid",parChance:false,
    strategy:"Signature hole. 181 into breeze. Waterfall behind — enjoy AFTER you hit. Four deep bunkers LEFT, well below green. Your draw wants to go there. Aim center-right. If draw works = center green. If stays right = chip for bogey.",
    missLeft:"Deep bunkers LEFT, below green. Hook = worst bunkers on the course. Aim further right.",
    missRight:"Short right = chip toward you. Easy bogey, possible par.",
    flop:"Short = take bogey, move to 18.",
    scoring:"Bogey is the plan. Green = par. Miss right = bogey. Both fine.",
    danger:"Left bunkers below green surface. Draw feeds toward them. Aim RIGHT.", target:"Bogey" },

  { num:18,par:4,white:362,hdcp:2,name:"The Finisher",teeClub:"Driver ⚡",parChance:false,
    strategy:"The famous 18th. DRIVER HOLE #2 of 2. 362 uphill into wind, plays 400+. 14 bunkers but fairway is generous. Aim far right bunker, let draw bring it center. PW approach (uphill + wind = take extra club).",
    missLeft:"Bunkers left. Play out, advance. Bogey is fine for the last hole.",
    missRight:"Bunkers right. Approach still manageable.",
    flop:"Bad drive still leaves you in range with two more shots.",
    scoring:"Bogey closes the round. Don't press. Smooth driver, wedge, two-putt. Whatever the score — it's yours. Finish strong.",
    danger:"14 bunkers but fairway is wide. Biggest danger = pressing for a number. Play your game.", target:"Bogey" }
];

const FRONT = HOLES.slice(0,9);
const BACK = HOLES.slice(9,18);

function App() {
  const [sel, setSel] = useState(0);
  const [miss, setMiss] = useState(null);
  const [scores, setScores] = useState(Array(18).fill(null));
  const [showPreRound, setShowPreRound] = useState(false);
  const hole = HOLES[sel];

  const totalPar = HOLES.reduce((s,h) => s+h.par, 0);
  const frontYds = FRONT.reduce((s,h) => s+h.white, 0);
  const backYds = BACK.reduce((s,h) => s+h.white, 0);
  const parChances = HOLES.filter(h => h.parChance).length;

  const holesPlayed = scores.filter(s => s !== null).length;
  const currentTotal = scores.reduce((s,v) => s+(v||0), 0);
  const overPar = scores.reduce((s,v,i) => v===null ? s : s+(v-HOLES[i].par), 0);
  const projected = currentTotal + HOLES.filter((_,i) => scores[i]===null).reduce((s,h) => s+h.par+1, 0);

  const record = (d) => {
    const v = hole.par+d;
    const n = [...scores];
    n[sel] = n[sel]===v ? null : v;
    setScores(n);
  };

  const sLabel = d => d<=-2?"Eagle":d===-1?"Birdie":d===0?"Par":d===1?"Bogey":d===2?"Dbl":d===3?"Trpl":`+${d}`;
  const sColor = d => d<=-1?"#3dbd6e":d===0?"#d4a843":d===1?"#b8a888":d===2?"#e07055":"#cc3333";

  const e = React.createElement;

  // Hole button
  const HoleBtn = ({h, idx}) => {
    const scored = scores[idx] !== null;
    const op = scored ? scores[idx]-h.par : null;
    const active = sel === idx;
    return e('button', {
      className: `hole-btn${active?' active':''}${scored?' scored':''}`,
      onClick: () => { setSel(idx); setMiss(null); },
      style: scored && !active ? {borderColor: sColor(op)+'66', background: sColor(op)+'18', color: sColor(op)} : {}
    }, scored ? scores[idx] : h.num);
  };

  return e('div', {style:{paddingBottom: 40}},

    // === HEADER ===
    e('div', {style:{padding:'32px 20px 24px', textAlign:'center', borderBottom:'2px solid var(--gold)', background:'linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%)'}},
      e('div', {style:{fontSize:13,letterSpacing:5,textTransform:'uppercase',color:'var(--gold)',marginBottom:8,fontWeight:600}}, 'Caddie Playbook'),
      e('h1', {style:{fontFamily:'var(--font-display)',fontSize:30,fontWeight:400,color:'#fff',marginBottom:6}}, 'Trump National LA'),
      e('div', {style:{fontSize:15,color:'var(--cream-dim)',marginBottom:14}}, `White Tees · ${frontYds+backYds} yds · Par ${totalPar}`),
      e('div', {style:{display:'flex',justifyContent:'center',gap:20,fontSize:14,color:'var(--gold)'}},
        e('span',null,'Thu Mar 19 · 12:30 PM'),
        e('span',null,'79°F Sunny')
      )
    ),

    // === TARGETS ===
    e('div', {style:{display:'flex',justifyContent:'center',gap:14,padding:'16px 20px',background:'rgba(0,0,0,0.25)',borderBottom:'1px solid rgba(212,168,67,0.15)'}},
      [{l:'Dream',s:85,e:'🌟'},{l:'Goal',s:89,e:'🎯'},{l:'Floor',s:99,e:'🛡️'}].map(t =>
        e('div',{key:t.l,style:{textAlign:'center',minWidth:85}},
          e('div',{style:{fontSize:13,color:'var(--cream-dim)',marginBottom:4}},`${t.e} ${t.l}`),
          e('div',{style:{fontFamily:'var(--font-display)',fontSize:28,color:'var(--gold)'}},t.s),
          e('div',{style:{fontSize:12,color:'var(--gold-dim)'}},`+${t.s-totalPar}`)
        )
      )
    ),

    // === QUICK STATS ===
    e('div',{style:{display:'flex',justifyContent:'center',gap:20,padding:'12px 20px',fontSize:14,color:'var(--cream-dim)',borderBottom:'1px solid rgba(212,168,67,0.1)'}},
      e('span',{style:{color:'var(--par-green)'}},`${parChances} par chances`),
      e('span',{style:{color:'var(--red)'}},`Driver: #9 & #18 only`)
    ),

    // === LIVE SCORE ===
    holesPlayed > 0 && e('div',{style:{textAlign:'center',padding:'14px 20px',background:overPar<=14?'var(--par-bg)':overPar<=18?'rgba(212,168,67,0.08)':'var(--red-bg)',borderBottom:'1px solid rgba(212,168,67,0.1)'}},
      e('span',{style:{fontSize:15,color:'var(--cream-dim)'}},`Thru ${holesPlayed}: `),
      e('span',{style:{fontFamily:'var(--font-display)',fontSize:26,color:'var(--gold)'}},`${currentTotal}`),
      e('span',{style:{fontSize:15,color:'var(--cream-dim)'}},` (${overPar>0?'+':''}${overPar}) · Pace: `),
      e('span',{style:{fontFamily:'var(--font-display)',fontSize:20,color:projected<=85?'var(--par-green)':projected<=89?'var(--gold)':projected<=99?'var(--cream-dim)':'var(--red)'}},projected)
    ),

    // === HOLE SELECTOR ===
    e('div',{style:{padding:'20px 16px 12px'}},
      e('div',{style:{textAlign:'center',fontSize:12,letterSpacing:3,color:'var(--cream-dim)',marginBottom:10,textTransform:'uppercase',fontWeight:600}},'Front 9'),
      e('div',{style:{display:'flex',gap:4,justifyContent:'center',flexWrap:'wrap',marginBottom:16}},
        ...FRONT.map((h,i) => e(HoleBtn, {key:h.num, h, idx:i}))
      ),
      e('div',{style:{textAlign:'center',fontSize:12,letterSpacing:3,color:'var(--cream-dim)',marginBottom:10,textTransform:'uppercase',fontWeight:600}},'Back 9'),
      e('div',{style:{display:'flex',gap:4,justifyContent:'center',flexWrap:'wrap'}},
        ...BACK.map((h,i) => e(HoleBtn, {key:h.num, h, idx:i+9}))
      )
    ),

    // === HOLE CARD ===
    e('div',{className:'card',style:{marginBottom:20}},

      // Header
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px',borderBottom:'1px solid rgba(212,168,67,0.12)',background:hole.parChance?'rgba(61,189,110,0.06)':'rgba(212,168,67,0.04)'}},
        e('div',null,
          e('div',{style:{fontFamily:'var(--font-display)',fontSize:28,color:'#fff'}},`Hole ${hole.num}`),
          e('div',{style:{fontSize:15,color:'var(--cream-dim)',marginTop:4}},
            `"${hole.name}" · HDCP ${hole.hdcp}`,
            hole.parChance && e('span',{style:{color:'var(--par-green)',fontWeight:700,marginLeft:8}},'★ PAR')
          )
        ),
        e('div',{style:{textAlign:'right'}},
          e('div',{style:{fontFamily:'var(--font-display)',fontSize:38,color:'var(--gold)'}},hole.white),
          e('div',{style:{fontSize:14,color:'var(--cream-dim)',fontWeight:600}},`YDS · PAR ${hole.par}`)
        )
      ),

      // Tee club
      e('div',{style:{display:'flex',alignItems:'center',gap:12,padding:'14px 24px',borderBottom:'1px solid rgba(212,168,67,0.08)',background:'rgba(0,0,0,0.15)'}},
        e('div',{style:{background:hole.teeClub.includes('Driver')?'var(--red)':'var(--gold)',color:hole.teeClub.includes('Driver')?'#fff':'var(--green-deep)',fontWeight:700,fontSize:13,padding:'6px 14px',borderRadius:8,letterSpacing:1}},
          'TEE'
        ),
        e('div',{style:{fontSize:20,fontWeight:700,color:'#fff'}},hole.teeClub)
      ),

      // Strategy
      e('div',{style:{padding:'24px'}},
        e('div',{className:'section-label'},'Game Plan'),
        e('p',{style:{fontSize:18,lineHeight:1.75,color:'var(--cream)'}},hole.strategy)
      ),

      // Target
      e('div',{style:{margin:'0 20px',padding:'16px 20px',background:hole.parChance?'var(--par-bg)':'rgba(212,168,67,0.06)',border:`2px solid ${hole.parChance?'rgba(61,189,110,0.3)':'rgba(212,168,67,0.15)'}`,borderRadius:14,display:'flex',alignItems:'center',gap:14}},
        e('span',{style:{fontSize:26}},hole.parChance?'🎯':'🛡️'),
        e('div',null,
          e('div',{style:{fontSize:12,color:'var(--cream-dim)',letterSpacing:2,fontWeight:600,textTransform:'uppercase'}},'Target'),
          e('div',{style:{fontSize:19,fontWeight:700,color:'#fff',marginTop:2}},hole.target)
        )
      ),

      // Danger
      e('div',{style:{margin:'16px 20px 0',padding:'16px 20px',background:'var(--red-bg)',border:'2px solid rgba(224,85,69,0.2)',borderRadius:14}},
        e('div',{style:{fontSize:13,color:'var(--red)',letterSpacing:2,fontWeight:700,marginBottom:6}},'⚠️ DANGER'),
        e('div',{style:{fontSize:17,lineHeight:1.7,color:'var(--cream)'}},hole.danger)
      ),

      // Miss buttons
      e('div',{style:{padding:'24px 20px'}},
        e('div',{className:'section-label'},'If You Miss...'),
        e('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
          [{k:'left',l:'⬅️ Hook',c:'var(--red)'},{k:'right',l:'➡️ Slice',c:'var(--gold-dim)'},{k:'flop',l:'⬇️ Chunk',c:'#888'}].map(m =>
            e('button',{key:m.k,className:`miss-btn${miss===m.k?' active':''}`,
              onClick:()=>setMiss(miss===m.k?null:m.k),
              style:miss===m.k?{borderColor:m.c,background:m.c+'20',color:'#fff'}:{}
            },m.l)
          )
        ),
        miss && e('div',{className:'miss-detail'},
          miss==='left'?hole.missLeft:miss==='right'?hole.missRight:hole.flop
        )
      ),

      // Scoring mindset
      e('div',{style:{padding:'0 24px 24px'}},
        e('div',{className:'section-label'},'Scoring Mindset'),
        e('p',{style:{fontSize:18,lineHeight:1.75,color:'var(--cream)'}},hole.scoring)
      ),

      // Score entry
      e('div',{style:{padding:'20px 24px',borderTop:'1.5px solid rgba(212,168,67,0.08)',background:'rgba(0,0,0,0.2)'}},
        e('div',{className:'section-label'},'Record Score'),
        e('div',{style:{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}},
          [-1,0,1,2,3,4].filter(d => hole.par+d>=1).map(d => {
            const v = hole.par+d;
            const active = scores[sel]===v;
            return e('button',{key:d,className:`score-btn${active?' active':''}`,
              onClick:()=>record(d),
              style:active?{borderColor:sColor(d),background:sColor(d)+'30'}:{}
            },
              e('div',{style:{fontSize:22,fontWeight:700}},v),
              e('div',{style:{fontSize:11,marginTop:3,fontWeight:500}},sLabel(d))
            );
          })
        )
      )
    ),

    // === PRE-ROUND TALK ===
    e('div',{style:{padding:'0 16px 20px'}},
      e('button',{onClick:()=>setShowPreRound(!showPreRound),style:{
        width:'100%',padding:'18px 24px',background:'var(--green-card)',border:'1.5px solid rgba(212,168,67,0.2)',borderRadius:14,
        color:'var(--gold)',fontSize:17,fontWeight:600,fontFamily:'var(--font-body)',cursor:'pointer',
        display:'flex',justifyContent:'space-between',alignItems:'center'
      }},
        e('span',null,'📋 Caddie\'s Pre-Round Talk'),
        e('span',{style:{fontSize:22,transition:'transform 0.2s',transform:showPreRound?'rotate(180deg)':'none'}},'▾')
      ),
      showPreRound && e('div',{style:{background:'var(--green-card)',border:'1.5px solid rgba(212,168,67,0.2)',borderTop:'none',borderRadius:'0 0 14px 14px',padding:'24px'}},
        ...[
          ['Bogey is your par.', `${parChances} par chances today (#1, #2, #3, #4, #10, #12, #15, #16). Convert 4, bogey the rest = 85.`],
          ['3-Hybrid off every tee.', 'Driver only on #9 and #18. 3H keeps you in play at 210–220. A 3H miss is recoverable. A driver miss here is a penalty.'],
          ['Your draw is the weapon.', 'Aim right-center, trust it. Straight = right-center fairway. Draw = middle. Both work. The high HOOK into cliffs, lakes, bunkers — that\'s the round-killer.'],
          ['Holes 5–9: survive.', 'Hardest five holes. Target +5 through here. Don\'t panic with a double.'],
          ['Break 90 math:', 'Bogey ALL 18 = 89. You don\'t need a single par.'],
          ['Wind:', '79°F, sunny, light. Picks up on back nine. Amplifies your draw on inland holes.']
        ].map(([t,txt],i) =>
          e('p',{key:i,style:{fontSize:17,lineHeight:1.75,color:'var(--cream)',marginBottom:i<5?16:0}},
            e('strong',{style:{color:'var(--gold)'}},t+' '), txt
          )
        )
      )
    ),

    // Footer
    e('div',{style:{textAlign:'center',padding:'20px',fontSize:15,color:'var(--gold-dim)',borderTop:'1px solid rgba(212,168,67,0.08)'}},
      'Bogey is your par. Pars are your birdies. Go get that 85. 🏌️‍♂️'
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
